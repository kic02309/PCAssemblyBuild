<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Assembly - 업무 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #1c2128;
  --border:   #30363d;
  --text:     #e6edf3;
  --muted:    #7d8590;
  --accent:   #2f81f7;
  --accent2:  #3fb950;
  --warn:     #d29922;
  --danger:   #f85149;
  --purple:   #bc8cff;
  --radius:   10px;
  --font:     'Noto Sans KR', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ── 공통 ── */
.hidden { display: none !important; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: var(--radius);
  border: none; cursor: pointer; font-family: var(--font);
  font-size: 14px; font-weight: 500; transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #388bfd; }
.btn-success { background: var(--accent2); color: #0d1117; }
.btn-success:hover { background: #56d364; }
.btn-danger  { background: var(--danger); color: #fff; }
.btn-danger:hover  { background: #ff7b72; }
.btn-ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover  { color: var(--text); border-color: var(--muted); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

input, select, textarea {
  width: 100%; padding: 10px 14px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--font); font-size: 14px;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--accent);
}
select option { background: var(--bg3); }

.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.tag {
  display: inline-block; padding: 2px 9px;
  border-radius: 20px; font-size: 11px; font-weight: 500;
}
.tag-blue   { background: #1f3a5f; color: #79c0ff; }
.tag-green  { background: #1a3d2b; color: #56d364; }
.tag-orange { background: #3d2b0a; color: #ffa657; }
.tag-purple { background: #2d1f47; color: var(--purple); }
.tag-red    { background: #3d1a1a; color: #ff7b72; }

/* ── 토스트 ── */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--border);
  padding: 12px 22px; border-radius: 30px;
  font-size: 14px; z-index: 9999;
  transition: opacity .3s; opacity: 0; pointer-events: none;
}
#toast.show { opacity: 1; }
#toast.ok   { border-color: var(--accent2); color: var(--accent2); }
#toast.err  { border-color: var(--danger);  color: var(--danger); }

/* ── 로그인 화면 ── */
#page-login {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
}
.login-box {
  width: 380px; padding: 44px 40px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px;
}
.login-logo {
  text-align: center; margin-bottom: 32px;
}
.login-logo .logo-icon {
  width: 56px; height: 56px; background: var(--accent);
  border-radius: 14px; display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 14px;
}
.login-logo h1 { font-size: 20px; font-weight: 700; }
.login-logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .5px; }
.login-btn { width: 100%; padding: 13px; font-size: 15px; margin-top: 8px; border-radius: var(--radius); }
.login-err { color: var(--danger); font-size: 13px; text-align: center; margin-top: 10px; }

/* ── 앱 레이아웃 ── */
#page-app { display: flex; flex-direction: column; min-height: 100vh; }

/* 상단 헤더 */
.app-header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.app-header .logo { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.app-header .logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 16px; }
.user-badge {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
}
.user-badge strong { color: var(--text); }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 700; color: #fff;
}

/* 탭 네비 */
.app-nav {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; gap: 4px;
}
.nav-tab {
  padding: 12px 18px; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s; background: none; border-top: none;
  border-left: none; border-right: none; font-family: var(--font);
}
.nav-tab:hover  { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 메인 콘텐츠 */
.app-content { flex: 1; padding: 28px 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

/* ── 입력 폼 ── */
.section-title {
  font-size: 16px; font-weight: 700; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before {
  content: ''; width: 4px; height: 18px;
  background: var(--accent); border-radius: 2px; display: block;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.form-full { grid-column: 1 / -1; }

.check-group { display: flex; flex-wrap: wrap; gap: 8px; }
.check-item {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg3); border: 1px solid var(--border);
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  font-size: 13px; transition: all .15s; user-select: none;
}
.check-item:hover { border-color: var(--accent); }
.check-item.selected { background: #1f3a5f; border-color: var(--accent); color: #79c0ff; }
.check-item input { display: none; }

/* 환산 미리보기 */
.score-preview {
  background: var(--bg3); border: 1px solid var(--accent);
  border-radius: var(--radius); padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 20px;
}
.score-big {
  font-family: var(--mono); font-size: 36px; font-weight: 600;
  color: var(--accent);
}
.score-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── 현황판 ── */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.stat-card .value { font-family: var(--mono); font-size: 28px; font-weight: 600; }
.stat-card .value.green  { color: var(--accent2); }
.stat-card .value.blue   { color: var(--accent); }
.stat-card .value.orange { color: var(--warn); }

/* 달성률 바 */
.progress-wrap { margin-top: 12px; }
.progress-bar {
  height: 6px; background: var(--bg3);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent2);
  border-radius: 3px; transition: width .6s ease;
}

/* 데이터 테이블 */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--bg3); color: var(--muted);
  font-size: 11px; font-weight: 500; letter-spacing: .5px;
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 10px 14px; color: var(--text); white-space: nowrap; }
tbody td .mono { font-family: var(--mono); }

/* ── 관리자 ── */
.admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.emp-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  transition: border-color .15s;
}
.emp-card:hover { border-color: var(--accent); }
.emp-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.emp-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); display: flex;
  align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0;
}
.emp-name { font-weight: 600; font-size: 15px; }
.emp-id   { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.emp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.emp-stat { background: var(--bg3); border-radius: 8px; padding: 10px; }
.emp-stat .s-label { font-size: 11px; color: var(--muted); }
.emp-stat .s-value { font-family: var(--mono); font-size: 18px; font-weight: 600; margin-top: 2px; }

/* 월 선택 */
.month-picker {
  display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
}
.month-picker label { font-size: 13px; color: var(--muted); }
.month-picker input { width: 160px; }

/* 로딩 */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--muted); font-size: 14px; gap: 10px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 반응형 */
@media (max-width: 640px) {
  .form-grid, .form-grid.three, .stat-grid { grid-template-columns: 1fr; }
  .app-content { padding: 16px; }
}
</style>
</head>
<body>

<!-- ▶ 로그인 페이지 -->
<div id="page-login">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">🖥️</div>
      <h1>PC Assembly Build</h1>
      <p>인원별 업무 관리 시스템</p>
    </div>
    <div class="form-group">
      <label>사번</label>
      <input type="text" id="inp-empid" placeholder="예: EMP001" autocomplete="off">
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="inp-name" placeholder="예: 홍길동">
    </div>
    <button class="btn btn-primary login-btn" onclick="doLogin()">로그인</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<!-- ▶ 메인 앱 -->
<div id="page-app" class="hidden">
  <!-- 헤더 -->
  <header class="app-header">
    <div class="logo">🖥️ <span>PCAssembly</span> Build</div>
    <div class="header-right">
      <div class="user-badge">
        <div class="avatar" id="user-avatar"></div>
        <div>
          <strong id="user-name-display"></strong>
          <div style="font-size:11px;" id="user-id-display"></div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <!-- 탭 네비 -->
  <nav class="app-nav" id="app-nav">
    <button class="nav-tab active" onclick="showTab('input')">📝 업무 입력</button>
    <button class="nav-tab" onclick="showTab('dashboard')">📊 내 현황</button>
    <button class="nav-tab hidden" id="tab-admin" onclick="showTab('admin')">👑 관리자</button>
  </nav>

  <!-- 콘텐츠 -->
  <main class="app-content">

    <!-- ── 업무 입력 탭 ── -->
    <div id="tab-input">
      <div class="section-title">업무 데이터 입력</div>

      <div class="card" style="margin-bottom:16px;">
        <div class="form-grid three" style="margin-bottom:16px;">
          <div class="form-group">
            <label>작업 날짜</label>
            <input type="date" id="f-date">
          </div>
          <div class="form-group">
            <label>수량</label>
            <input type="number" id="f-qty" value="1" min="1" max="99" oninput="calcScore()">
          </div>
          <div class="form-group">
            <label>조립 구분</label>
            <select id="f-assembly" onchange="calcScore()">
              <option value="">선택</option>
              <option value="일반">일반</option>
              <option value="특수/프리">특수/프리</option>
              <option value="추천/웍스">추천/웍스</option>
              <option value="출고">출고</option>
              <option value="반조">반조</option>
            </select>
          </div>
        </div>

        <!-- 제품 이동 -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">제품 이동</label>
          <div class="check-group" id="chk-move">
            <label class="check-item" onclick="selectOne(this,'chk-move')"><input type="radio" name="move" value="방문" onchange="calcScore()">방문 <span class="tag tag-blue">0.33</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-move')"><input type="radio" name="move" value="퀵+당일" onchange="calcScore()">퀵+당일 <span class="tag tag-blue">0.66</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-move')"><input type="radio" name="move" value="안정화+택배" onchange="calcScore()">안정화+택배 <span class="tag tag-blue">1.0</span></label>
          </div>
        </div>

        <!-- 케이스 등급 -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">케이스 등급</label>
          <div class="check-group" id="chk-case">
            <label class="check-item" onclick="selectOne(this,'chk-case')"><input type="radio" name="case" value="A" onchange="calcScore()">A급 <span class="tag tag-green">12분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-case')"><input type="radio" name="case" value="B" onchange="calcScore()">B급 <span class="tag tag-green">18분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-case')"><input type="radio" name="case" value="C" onchange="calcScore()">C급 <span class="tag tag-green">23분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-case')"><input type="radio" name="case" value="D" onchange="calcScore()">D급 <span class="tag tag-orange">27분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-case')"><input type="radio" name="case" value="E" onchange="calcScore()">E급 <span class="tag tag-orange">30분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-case')"><input type="radio" name="case" value="F" onchange="calcScore()">F급 <span class="tag tag-red">35분</span></label>
          </div>
        </div>

        <!-- 쿨러 등급 -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">쿨러 등급</label>
          <div class="check-group" id="chk-cooler">
            <label class="check-item" onclick="selectOne(this,'chk-cooler')"><input type="radio" name="cooler" value="A" onchange="calcScore()">쿨러A <span class="tag tag-green">3.5분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-cooler')"><input type="radio" name="cooler" value="B" onchange="calcScore()">쿨러B <span class="tag tag-green">6분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-cooler')"><input type="radio" name="cooler" value="C" onchange="calcScore()">쿨러C <span class="tag tag-green">9분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-cooler')"><input type="radio" name="cooler" value="D" onchange="calcScore()">쿨러D <span class="tag tag-orange">14분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-cooler')"><input type="radio" name="cooler" value="E" onchange="calcScore()">쿨러E <span class="tag tag-orange">18분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-cooler')"><input type="radio" name="cooler" value="F" onchange="calcScore()">쿨러F <span class="tag tag-red">22분</span></label>
          </div>
        </div>

        <!-- 케이스+쿨러 -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">케이스 쿨러</label>
          <div class="check-group" id="chk-casecooler">
            <label class="check-item" onclick="selectOne(this,'chk-casecooler')"><input type="radio" name="casecooler" value="A" onchange="calcScore()">케이스쿨러A <span class="tag tag-green">2.6분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-casecooler')"><input type="radio" name="casecooler" value="B" onchange="calcScore()">케이스쿨러B <span class="tag tag-green">3.5분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-casecooler')"><input type="radio" name="casecooler" value="C" onchange="calcScore()">케이스쿨러C <span class="tag tag-orange">4.2분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-casecooler')"><input type="radio" name="casecooler" value="제거" onchange="calcScore()">쿨러제거 <span class="tag tag-blue">2분</span></label>
          </div>
        </div>

        <!-- 운영체제 -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">운영체제</label>
          <div class="check-group" id="chk-os">
            <label class="check-item" onclick="selectOne(this,'chk-os')"><input type="radio" name="os" value="OS" onchange="calcScore()">O/S <span class="tag tag-blue">7분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-os')"><input type="radio" name="os" value="D+M" onchange="calcScore()">D+M <span class="tag tag-blue">10분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-os')"><input type="radio" name="os" value="재인증" onchange="calcScore()">재인증 <span class="tag tag-blue">10분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-os')"><input type="radio" name="os" value="안정화" onchange="calcScore()">안정화 <span class="tag tag-blue">6분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-os')"><input type="radio" name="os" value="안+삭" onchange="calcScore()">안+삭 <span class="tag tag-blue">8분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-os')"><input type="radio" name="os" value="B+Up" onchange="calcScore()">B+Up <span class="tag tag-blue">1.5분</span></label>
          </div>
        </div>

        <!-- 출고+완충 -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">출고 + 완충</label>
          <div class="check-group" id="chk-ship">
            <label class="check-item" onclick="selectOne(this,'chk-ship')"><input type="radio" name="ship" value="검+기" onchange="calcScore()">검+기 <span class="tag tag-green">4분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-ship')"><input type="radio" name="ship" value="완충1" onchange="calcScore()">완충1 <span class="tag tag-green">3분</span></label>
            <label class="check-item" onclick="selectOne(this,'chk-ship')"><input type="radio" name="ship" value="완충2" onchange="calcScore()">완충2 <span class="tag tag-orange">5분</span></label>
          </div>
        </div>

        <!-- 옵션 추가/변경 (복수선택) -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">옵션 추가/변경 <span style="color:var(--accent);font-size:11px;">(복수선택 가능)</span></label>
          <div class="check-group" id="chk-opt">
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="옵1" onchange="calcScore()">추가변경1 <span class="tag tag-blue">1분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="옵2" onchange="calcScore()">추가변경2 <span class="tag tag-blue">3분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="옵3" onchange="calcScore()">추가변경3 <span class="tag tag-blue">4분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="옵4" onchange="calcScore()">추가변경4 <span class="tag tag-blue">2분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="옵5" onchange="calcScore()">추가변경5 <span class="tag tag-orange">5분</span></label>
          </div>

        <!-- 난이도 추가 (복수선택) -->
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">난이도 + 추가 <span style="color:var(--accent);font-size:11px;">(복수선택 가능)</span></label>
          <div class="check-group" id="chk-diff">
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="난1" onchange="calcScore()">난이도상1 <span class="tag tag-orange">1.5분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="난2" onchange="calcScore()">난이도상2 <span class="tag tag-orange">2분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="난3" onchange="calcScore()">난이도상3 <span class="tag tag-orange">4분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="특/추" onchange="calcScore()">특수추가 <span class="tag tag-red">10분</span></label>
          </div>
        </div>

        <!-- 반조+포장 (복수선택) -->
        <div style="margin-bottom:20px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">반조 + 포장</label>
          <div class="check-group" id="chk-pack">
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="반조받음" onchange="calcScore()">반조받음 <span class="tag tag-red">-3분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="개인포장" onchange="calcScore()">개인포장 <span class="tag tag-green">5분</span></label>
            <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="반조진행" onchange="calcScore()">반조진행 <span class="tag tag-blue">3분</span></label>
          </div>
        </div>

        <!-- 특이사항 -->
        <div style="margin-bottom:20px;">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:8px;">특이사항 메모</label>
          <textarea id="f-memo" rows="2" placeholder="특이사항이 있으면 입력하세요"></textarea>
        </div>

        <!-- 환산 점수 미리보기 -->
        <div class="score-preview">
          <div>
            <div class="score-big" id="score-display">0.00</div>
            <div class="score-label">환산 점수 (30분 = 1.0점 기준)</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">예상 소요시간</div>
            <div style="font-family:var(--mono);font-size:20px;" id="time-display">0분</div>
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
          <button class="btn btn-ghost" onclick="resetForm()">초기화</button>
          <button class="btn btn-success" onclick="submitWork()">💾 저장하기</button>
        </div>
      </div>

    <!-- ── 내 현황 탭 ── -->
    <div id="tab-dashboard" class="hidden">
      <div class="month-picker">
        <label>조회 월</label>
        <input type="month" id="dash-month">
        <button class="btn btn-primary btn-sm" onclick="loadDashboard()">조회</button>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="label">총 처리 건수</div>
          <div class="value blue" id="d-count">-</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px;">건</div>
        </div>
        <div class="stat-card">
          <div class="label">총 환산 점수</div>
          <div class="value green" id="d-score">-</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px;">점</div>
        </div>
        <div class="stat-card">
          <div class="label">목표 달성률</div>
          <div class="value orange" id="d-rate">-</div>
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="d-progress" style="width:0%"></div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title" style="margin-bottom:16px;">이번달 입력 내역</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>조립구분</th>
                <th>케이스</th>
                <th>쿨러</th>
                <th>운영체제</th>
                <th>환산점수</th>
                <th>특이사항</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="d-table-body">
              <tr><td colspan="8" class="loading">조회 버튼을 눌러주세요</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── 관리자 탭 ── -->
    <div id="tab-admin" class="hidden">
      <div class="month-picker">
        <label>조회 월</label>
        <input type="month" id="admin-month">
        <button class="btn btn-primary btn-sm" onclick="loadAdmin()">조회</button>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="section-title" style="margin:0;">인원별 업무 현황</div>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ CSV 다운로드</button>
      </div>

      <div id="admin-grid" class="admin-grid">
        <div class="loading"><div class="spinner"></div>조회 버튼을 눌러주세요</div>
      </div>
    </div>

  </main>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbzDlrmhr3xKciixpq2-ScHzc0d3Ld-B_A35yF-VPEBRmSVZ01Z467qwc4Hf1iPLM7NCpw/exec'; // ← 나중에 교체

// 환산 점수표 (분 단위 → /30 = 점수)
const SCORES = {
  move:   { '방문': 0.33, '퀵+당일': 0.66, '안정화+택배': 1.0 },
  case:   { 'A': 12, 'B': 18, 'C': 23, 'D': 27, 'E': 30, 'F': 35 },
  cooler: { 'A': 3.5, 'B': 6, 'C': 9, 'D': 14, 'E': 18, 'F': 22 },
  casecooler: { 'A': 2.6, 'B': 3.5, 'C': 4.2, '제거': 2 },
  os:     { 'OS': 7, 'D+M': 10, '재인증': 10, '안정화': 6, '안+삭': 8, 'B+Up': 1.5 },
  ship:   { '검+기': 4, '완충1': 3, '완충2': 5 },
  opt:    { '옵1': 1, '옵2': 3, '옵3': 4, '옵4': 2, '옵5': 5 },
  diff:   { '난1': 1.5, '난2': 2, '난3': 4, '특/추': 10 },
  pack:   { '반조받음': -3, '개인포장': 5, '반조진행': 3 }
};
const GOAL = 16; // 월 목표 점수

// ── 상태 ──────────────────────────────────────────────────────
let currentUser = null;
let adminData = [];

// ── 초기화 ────────────────────────────────────────────────────
window.onload = () => {
  const saved = sessionStorage.getItem('pcb_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    enterApp();
  }
  // 날짜 기본값
  document.getElementById('f-date').value = today();
  const m = todayMonth();
  document.getElementById('dash-month').value = m;
  document.getElementById('admin-month').value = m;
};

function today() {
  return new Date().toISOString().split('T')[0];
}
function todayMonth() {
  return new Date().toISOString().slice(0, 7);
}

// ── 로그인 ────────────────────────────────────────────────────
async function doLogin() {
  const empId = document.getElementById('inp-empid').value.trim();
  const name  = document.getElementById('inp-name').value.trim();
  if (!empId || !name) { showErr('사번과 이름을 입력해주세요.'); return; }

  document.getElementById('login-err').textContent = '';
  try {
    const res = await api({ action: 'login', empId, name });
    if (res.success) {
      currentUser = res;
      sessionStorage.setItem('pcb_user', JSON.stringify(res));
      enterApp();
    } else {
      showErr(res.message || '로그인 실패');
    }
  } catch(e) {
    showErr('서버 연결 실패. 잠시 후 다시 시도하세요.');
  }
}

function showErr(msg) {
  document.getElementById('login-err').textContent = msg;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('page-login').classList.contains('hidden')) doLogin();
});

function enterApp() {
  document.getElementById('page-login').classList.add('hidden');
  document.getElementById('page-app').classList.remove('hidden');
  document.getElementById('user-name-display').textContent = currentUser.name;
  document.getElementById('user-id-display').textContent = currentUser.empId;
  document.getElementById('user-avatar').textContent = currentUser.name[0];

  if (currentUser.role === 'admin') {
    document.getElementById('tab-admin').classList.remove('hidden');
  }
}

function doLogout() {
  sessionStorage.removeItem('pcb_user');
  location.reload();
}

// ── 탭 전환 ───────────────────────────────────────────────────
function showTab(tab) {
  ['input','dashboard','admin'].forEach(t => {
    document.getElementById('tab-' + t)?.classList.add('hidden');
  });
  document.getElementById('tab-' + tab).classList.remove('hidden');

  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');

  if (tab === 'dashboard') loadDashboard();
  if (tab === 'admin') loadAdmin();
}

// ── 체크박스 조작 ─────────────────────────────────────────────
function selectOne(el, groupId) {
  document.querySelectorAll('#' + groupId + ' .check-item').forEach(i => i.classList.remove('selected'));
  el.classList.toggle('selected');
  // 이미 선택된 라디오를 다시 클릭하면 해제
  const radio = el.querySelector('input[type=radio]');
  if (radio && el.classList.contains('selected')) radio.checked = true;
  else if (radio) radio.checked = false;
  calcScore();
}

function toggleCheck(el) {
  el.classList.toggle('selected');
  const cb = el.querySelector('input[type=checkbox]');
  if (cb) cb.checked = el.classList.contains('selected');
  calcScore();
}

// ── 점수 계산 ─────────────────────────────────────────────────
function calcScore() {
  let minutes = 0;
  const qty = parseInt(document.getElementById('f-qty').value) || 1;

  const getRadio = name => {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : null;
  };
  const getChecks = groupId => {
    const checked = [];
    document.querySelectorAll('#' + groupId + ' input[type=checkbox]:checked').forEach(el => checked.push(el.value));
    return checked;
  };

  // 라디오 항목들
  const moveVal = getRadio('move');
  if (moveVal && SCORES.move[moveVal]) minutes += SCORES.move[moveVal] * 30; // move는 이미 점수라 30 곱하지 않음
  // 실제로는 move가 분이 아닌 점수이므로 별도 처리
  let moveScore = moveVal ? (SCORES.move[moveVal] || 0) : 0;

  const caseVal = getRadio('case');
  const coolerVal = getRadio('cooler');
  const caseCoolerVal = getRadio('casecooler');
  const osVal = getRadio('os');
  const shipVal = getRadio('ship');

  // 분 계산
  let totalMin = 0;
  if (caseVal)      totalMin += (SCORES.case[caseVal] || 0);
  if (coolerVal)    totalMin += (SCORES.cooler[coolerVal] || 0);
  if (caseCoolerVal) totalMin += (SCORES.casecooler[caseCoolerVal] || 0);
  if (osVal)        totalMin += (SCORES.os[osVal] || 0);
  if (shipVal)      totalMin += (SCORES.ship[shipVal] || 0);

  getChecks('chk-opt').forEach(v => { totalMin += (SCORES.opt[v] || 0); });
  getChecks('chk-diff').forEach(v => { totalMin += (SCORES.diff[v] || 0); });
  getChecks('chk-pack').forEach(v => { totalMin += (SCORES.pack[v] || 0); });

  // 수량 * 분 → 점수 + 이동 점수
  const score = (totalMin / 30 * qty) + moveScore;

  document.getElementById('score-display').textContent = Math.max(0, score).toFixed(2);
  document.getElementById('time-display').textContent = (totalMin * qty).toFixed(0) + '분';
  return { score: Math.max(0, score).toFixed(2), totalMin };
}

// ── 폼 초기화 ─────────────────────────────────────────────────
function resetForm() {
  document.getElementById('f-qty').value = 1;
  document.getElementById('f-assembly').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('f-date').value = today();
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.check-item input').forEach(el => el.checked = false);
  calcScore();
}

// ── 저장 ──────────────────────────────────────────────────────
async function submitWork() {
  if (!currentUser) return;

  const getRadioVal = name => {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : '';
  };
  const getCheckVals = groupId => {
    const vals = [];
    document.querySelectorAll('#' + groupId + ' input[type=checkbox]:checked').forEach(el => vals.push(el.value));
    return vals.join(',');
  };

  const { score } = calcScore();

  const params = {
    action: 'saveWork',
    empId: currentUser.empId,
    name: currentUser.name,
    workDate: document.getElementById('f-date').value,
    assemblyType: document.getElementById('f-assembly').value,
    qty: document.getElementById('f-qty').value,
    moveType: getRadioVal('move'),
    caseGrade: getRadioVal('case'),
    coolerGrade: getRadioVal('cooler'),
    caseCooler: getRadioVal('casecooler'),
    osType: getRadioVal('os'),
    shipBuffer: getRadioVal('ship'),
    optionChange: getCheckVals('chk-opt'),
    difficulty: getCheckVals('chk-diff'),
    halfPack: getCheckVals('chk-pack'),
    totalScore: score,
    memo: document.getElementById('f-memo').value
  };

  try {
    const res = await api(params);
    if (res.success) {
      toast('저장되었습니다! 🎉', 'ok');
      resetForm();
    } else {
      toast(res.message || '저장 실패', 'err');
    }
  } catch(e) {
    toast('서버 오류가 발생했습니다.', 'err');
  }
}

// ── 대시보드 로드 ─────────────────────────────────────────────
async function loadDashboard() {
  const yyyymm = document.getElementById('dash-month').value.replace('-', '_');
  const tbody = document.getElementById('d-table-body');
  tbody.innerHTML = '<tr><td colspan="8"><div class="loading"><div class="spinner"></div>로딩중...</div></td></tr>';

  try {
    const res = await api({ action: 'getStats', empId: currentUser.empId, yyyymm });
    if (!res.success) { toast('조회 실패', 'err'); return; }

    document.getElementById('d-count').textContent = res.totalCount;
    document.getElementById('d-score').textContent = res.totalScore.toFixed(2);
    const rate = Math.min(100, (res.totalScore / GOAL * 100)).toFixed(1);
    document.getElementById('d-rate').textContent = rate + '%';
    document.getElementById('d-progress').style.width = rate + '%';

    // 내 데이터 상세
    const res2 = await api({ action: 'getMyData', empId: currentUser.empId, yyyymm });
    if (!res2.success || !res2.data.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px;">데이터 없음</td></tr>';
      return;
    }

    tbody.innerHTML = res2.data.map(r => `
      <tr>
        <td>${String(r['날짜']).substring(0,10)}</td>
        <td><span class="tag tag-blue">${r['조립구분']||'-'}</span></td>
        <td>${r['케이스']||'-'}</td>
        <td>${r['쿨러']||'-'}</td>
        <td>${r['운영체제']||'-'}</td>
        <td><span class="mono" style="color:var(--accent2)">${Number(r['환산합계']).toFixed(2)}</span></td>
        <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;">${r['특이사항']||'-'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteRow(${r['_rowIndex']},'${yyyymm}')">삭제</button></td>
      </tr>
    `).join('');
  } catch(e) {
    toast('오류: ' + e.message, 'err');
  }
}

async function deleteRow(rowIndex, yyyymm) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  const res = await api({ action: 'deleteWork', empId: currentUser.empId, rowIndex, yyyymm });
  if (res.success) { toast('삭제 완료', 'ok'); loadDashboard(); }
  else toast(res.message, 'err');
}

// ── 관리자 로드 ───────────────────────────────────────────────
async function loadAdmin() {
  if (currentUser.role !== 'admin') return;
  const yyyymm = document.getElementById('admin-month').value.replace('-', '_');
  const grid = document.getElementById('admin-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>로딩중...</div>';

  try {
    const res = await api({ action: 'getAllStats', role: 'admin', empId: currentUser.empId, yyyymm });
    if (!res.success) { toast('조회 실패', 'err'); return; }
    adminData = res.data;

    if (!res.data.length) {
      grid.innerHTML = '<div class="loading">데이터 없음</div>';
      return;
    }

    const colors = ['#2f81f7','#3fb950','#bc8cff','#d29922','#f0883e','#79c0ff'];
    grid.innerHTML = res.data.map((emp, i) => {
      const rate = Math.min(100, (emp.totalScore / GOAL * 100)).toFixed(1);
      const color = colors[i % colors.length];
      return `
        <div class="emp-card">
          <div class="emp-card-header">
            <div class="emp-avatar" style="background:${color}">${emp.name[0]}</div>
            <div>
              <div class="emp-name">${emp.name}</div>
              <div class="emp-id">${emp.empId}</div>
            </div>
          </div>
          <div class="emp-stats">
            <div class="emp-stat">
              <div class="s-label">총 처리건</div>
              <div class="s-value" style="color:${color}">${emp.count}</div>
            </div>
            <div class="emp-stat">
              <div class="s-label">환산점수</div>
              <div class="s-value" style="color:${color}">${emp.totalScore.toFixed(1)}</div>
            </div>
            <div class="emp-stat">
              <div class="s-label">평균점수</div>
              <div class="s-value">${emp.avgScore.toFixed(2)}</div>
            </div>
            <div class="emp-stat">
              <div class="s-label">달성률</div>
              <div class="s-value">${rate}%</div>
            </div>
          </div>
          <div class="progress-wrap" style="margin-top:12px;">
            <div class="progress-bar">
              <div class="progress-fill" style="width:${rate}%;background:${color}"></div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    toast('오류: ' + e.message, 'err');
  }
}

function exportCSV() {
  if (!adminData.length) { toast('먼저 조회해주세요', 'err'); return; }
  const header = '사번,이름,처리건수,총환산점수,평균점수';
  const rows = adminData.map(e => `${e.empId},${e.name},${e.count},${e.totalScore},${e.avgScore}`);
  const csv = '\uFEFF' + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `업무통계_${document.getElementById('admin-month').value}.csv`;
  a.click();
}

// ── API 호출 ──────────────────────────────────────────────────
async function api(params) {
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

// ── 토스트 ────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, 2500);
}
</script>
</body>
</html>
